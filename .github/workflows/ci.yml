name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    env:
      NODE_VERSION: 18.x
      JAVA_VERSION: 17

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Install dependencies
        run: npm ci

      - name: Install iOS pods
        if: runner.os == 'macOS'
        run: |
          cd ios
          pod install
          cd ..

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Android APK
        if: runner.os == 'linux' || runner.os == 'macOS'
        run: |
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../app-debug.apk

      - name: Build iOS app
        if: runner.os == 'macOS'
        run: |
          xcodebuild -workspace ios/CardScannerApp.xcworkspace -scheme CardScannerApp -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 14,OS=latest' clean build | xcpretty

      - name: Upload Android artifact
        if: runner.os == 'linux' || runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app-debug.apk

      - name: Upload iOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/build/Debug-iphonesimulator/CardScannerApp.app
